name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: sqlite

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create SQLite test database
        run: |
          mkdir -p database
          touch database/testing.sqlite
          php artisan migrate --database=sqlite --force
          php artisan migrate --path=database/migrations/credentials --database=sqlite --force
          php artisan migrate --path=database/migrations/content --database=sqlite --force

      - name: Run tests
        run: ./vendor/bin/pest
