version: '3.8'

services:
  app:
    build: .
    container_name: nexaSystem_E-grocery
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      # Volume compartilhado para logs (no Swarm, o stack nexasystem monta este volume em /var/log/nexasystem-cliente para o Log Viewer)
      - cliente_e-grocery_logs:/var/www/html/storage/logs
    depends_on:
      - db
    restart: "no"
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
    ports:
      - "8030:80"
      - "5176:5176"
    command: bash -c "chown -R www-data:www-data storage bootstrap/cache && apache2-foreground && npm run dev"

  db:
    image: postgres:16-alpine
    container_name: nexaSystem_E-grocery-db
    ports:
      - "5434:5432"
    restart: "no"
    environment:
      POSTGRES_PASSWORD: rootpassword123
